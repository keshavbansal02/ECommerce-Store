server:
  port: 9091
  servlet:
    context-path: /ECommerceStore

spring:
  application:
    name: ECommerceStore
  datasource:
    url: jdbc:mysql://localhost:3306/EcommerceStore
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

